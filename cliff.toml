# git-cliff configuration — https://git-cliff.org
# Generates CHANGELOG.md from Conventional Commits.

[changelog]
header = """
# Changelog

All notable changes to **VoidUI** are documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html),
and entries are generated from [Conventional Commits](https://www.conventionalcommits.org).
"""
body = """
{% if version -%}
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
    ## [unreleased]
{% endif -%}
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper_first }}
    {% for commit in commits -%}
        - {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
            {% if commit.remote.username %} by @{{ commit.remote.username }}{% endif %}\
            {% if commit.remote.pr_number %} in [#{{ commit.remote.pr_number }}]({{ self::repo_url() }}/pull/{{ commit.remote.pr_number }}){% endif %} ({{ commit.id | truncate(length=7, end="") }})
    {% endfor %}
{% endfor %}
"""
footer = """
<!-- generated by git-cliff -->
"""
trim = true
postprocessors = []

[changelog.macros]
repo_url = """https://github.com/Satcomx00-x00/VoidUI"""

[bump]
# Ensure auto-bumped versions are prefixed with `v` to satisfy `tag_pattern`.
initial_tag = "v0.1.0"

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9].*"
skip_tags = "^v?0\\.0\\.0"
ignore_tags = ""
topo_order = false
sort_commits = "newest"

commit_parsers = [
  { message = "^feat",     group = "✨ Features" },
  { message = "^fix",      group = "🐛 Bug Fixes" },
  { message = "^perf",     group = "⚡ Performance" },
  { message = "^refactor", group = "♻️ Refactor" },
  { message = "^docs",     group = "📝 Documentation" },
  { message = "^style",    group = "🎨 Styles" },
  { message = "^test",     group = "🧪 Tests" },
  { message = "^build",    group = "📦 Build" },
  { message = "^ci",       group = "🤖 CI/CD" },
  { message = "^chore\\(release\\):", skip = true },
  { message = "^chore\\(deps\\)",     group = "📦 Dependencies" },
  { message = "^chore",    group = "🧹 Chores" },
  { message = "^revert",   group = "⏪ Reverts" },
  { body = ".*security",   group = "🔒 Security" },
  { message = ".*",        group = "🌀 Other" },
]
