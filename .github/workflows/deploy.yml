# Retired: this workflow has been replaced by `pages.yml`, which builds the
# static export with `GITHUB_PAGES=true` so that `next build` actually emits
# the `out/` directory expected by `actions/upload-pages-artifact`.
#
# The previous version of this file ran `bun run build` without setting
# `GITHUB_PAGES=true`, so `output: "export"` was disabled and `out/` was
# never created — causing `tar: out: Cannot open: No such file or directory`.
#
# Kept as a manually-triggerable no-op to avoid breaking external references
# (e.g. status-check rules) that may still mention this workflow by name.
name: Deploy to GitHub Pages (retired)

on:
  workflow_dispatch:

jobs:
  noop:
    name: No-op
    runs-on: ubuntu-latest
    steps:
      - name: Notice
        run: echo "Replaced by .github/workflows/pages.yml"
