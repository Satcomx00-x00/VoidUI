name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-flight runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  commitlint:
    name: Commit messages (Conventional Commits)
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need full history so we can lint the entire PR / push range.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Resolve commit range
        id: range
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            FROM="${{ github.event.pull_request.base.sha }}"
            TO="${{ github.event.pull_request.head.sha }}"
          elif [[ -n "${{ github.event.before }}" && "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]]; then
            FROM="${{ github.event.before }}"
            TO="${{ github.sha }}"
          else
            # First push to a new branch — lint just the latest commit.
            FROM="${{ github.sha }}~1"
            TO="${{ github.sha }}"
          fi
          echo "from=$FROM" >> "$GITHUB_OUTPUT"
          echo "to=$TO"     >> "$GITHUB_OUTPUT"
          echo "Linting commits in range: $FROM..$TO"

      - name: Lint commit messages
        run: bun x commitlint --from "${{ steps.range.outputs.from }}" --to "${{ steps.range.outputs.to }}" --verbose

  verify:
    name: Lint · Typecheck · Build
    needs: commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Build library
        run: bun run build:lib

      - name: Check published exports (attw)
        run: bun run check:exports
        continue-on-error: true

      - name: Lint package metadata (publint)
        run: bun run check:publish

      - name: Bundle size budgets
        run: bun run size

      - name: Build Next.js app
        run: bun run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Verify package can be packed
        run: npm pack --dry-run
