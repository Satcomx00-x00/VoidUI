version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
    open-pull-requests-limit: 10
    labels: ["dependencies"]
    groups:
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@eslint/*", "@typescript-eslint/*"]
      next:
        patterns: ["next", "eslint-config-next", "@next/*"]
      tailwind:
        patterns: ["tailwindcss", "@tailwindcss/*", "prettier-plugin-tailwindcss"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    labels: ["dependencies", "ci"]
